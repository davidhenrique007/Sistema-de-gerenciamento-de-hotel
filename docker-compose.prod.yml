version: '3.8'

services:
  # Nginx como reverse proxy com HTTPS
  nginx:
    image: nginx:alpine
    container_name: hotel_paradise_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
    networks:
      - hotel_network
    restart: unless-stopped

  # Backend Node.js
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: hotel_paradise_backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DOMAIN=${DOMAIN}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
    expose:
      - "5000"
    depends_on:
      - postgres
      - redis
    networks:
      - hotel_network
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: hotel_paradise_postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hotel_network
    restart: unless-stopped

  # Redis para cache
  redis:
    image: redis:alpine
    container_name: hotel_paradise_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - hotel_network
    restart: unless-stopped

networks:
  hotel_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: