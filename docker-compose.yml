# =====================================================
# HOTEL PARADISE - DOCKER COMPOSE
# Versão: 1.0.0
# Descrição: Configuração dos containers para desenvolvimento
# =====================================================

version: '3.8'

services:
  # =====================================================
  # SERVIÇO: PostgreSQL
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: hotel_paradise_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-hotel_paradise}
      TZ: America/Sao_Paulo
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/models/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/models/indices.sql:/docker-entrypoint-initdb.d/02-indices.sql
    networks:
      - hotel_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # SERVIÇO: Backend Node.js
  # =====================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel_paradise_backend
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-hotel_paradise}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hotel_network
    command: npm run dev

  # =====================================================
  # SERVIÇO: pgAdmin (Opcional - Interface para PostgreSQL)
  # =====================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hotel_paradise_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hotelparadise.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - hotel_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

# =====================================================
# VOLUMES
# =====================================================
volumes:
  postgres_data:
    name: hotel_paradise_postgres_data
  pgadmin_data:
    name: hotel_paradise_pgadmin_data

# =====================================================
# NETWORKS
# =====================================================
networks:
  hotel_network:
    name: hotel_paradise_network
    driver: bridge